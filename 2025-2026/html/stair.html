
<!DOCTYPE html>
<html>
<head>
    <style>
        table {
            /* Required for empty-cells: hide to work */
            border-collapse: separate;
            empty-cells: hide;
            border-spacing: 5px;
        }

        td {
            border-top: 1px solid black;
            border-right: 1px solid black;

            width: 40px;
            height: 40px;
            text-align: center;
            /* Bold all letters */
            font-weight: bold;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <td>S</td>
        <td></td><td></td><td></td><td></td>
    </tr>
    <tr>
        <td></td>
        <td>T</td>
        <td></td><td></td><td></td>
    </tr>
    <tr>
        <td></td><td></td>
        <td>A</td>
        <td></td><td></td>
    </tr>
    <tr>
        <td></td><td></td><td></td>
        <td>I</td>
        <td></td>
    </tr>
    <tr>
        <td></td><td></td><td></td><td></td>
        <td>R</td>
    </tr>
</table>

</body>
</html>
