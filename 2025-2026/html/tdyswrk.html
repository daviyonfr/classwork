<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Practice</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 10px;
            text-align: center;
        }
        th {
            font-size: 1.5em;
        }
    </style>
</head>
<body>
<table>
    <tr>
        <th colspan="3">Heading</th>
    </tr>
    <tr>
        <td rowspan="2">Span</td>
        <td>Not span</td>
        <td>Not span</td>
    </tr>
    <tr>
        <td>Not span</td>
        <td>Not span</td>
    </tr>
</table>
</body>
</html>
