<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Card Gallery</title>

    <link rel="stylesheet" href="card.css">
</head>
<body>

<main class="card-container">
    <article class="hero-card">
        <div class="card-content">
            <h2>The Glitch</h2>
            <p><strong>Power:</strong> Digital Warping</p>
            <p><strong>Origin:</strong> Silicon Valley</p>
            <p class="stats">Speed: 99 | Defense: 40</p>
        </div>
    </article>

    <article class="hero-card">
        <div class="card-content">
            <h2>Solaris</h2>
            <p><strong>Power:</strong> Starfire Energy</p>
            <p><strong>Origin:</strong> Andromeda</p>
            <p class="stats">Speed: 75 | Defense: 95</p>
        </div>

    </article>

    <article class="hero-card">
        <div class="card-content">
            <h2>Iron Root</h2>
            <p><strong>Power:</strong> Nature Control</p>
            <p><strong>Origin:</strong> Amazon Basin</p>
            <p class="stats">Speed: 30 | Defense: 100</p>
        </div>
    </article>
</main>

</body>
</html>
